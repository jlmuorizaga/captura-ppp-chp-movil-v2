<ion-header [translucent]="true">
  <ion-toolbar color="custom">
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title class="ion-text-center">
      Edita Relación Salsa Sucursal
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-grid fixed>
    <ion-row justify-content-center>
      <ion-col size="12" size-md="8" size-lg="6">
        <ion-card>
          <ion-card-header>
            <ion-card-title>Detalles de la Salsa</ion-card-title>
          </ion-card-header>
          <ion-card-content>
            <div class="info-container">
              <p><strong>ID Salsa:</strong> {{idSalsa}}</p>
              <p><strong>Descripción:</strong> {{descripcionSalsa}}</p>
              <p><strong>Clave Sucursal:</strong> {{claveSucursal}}</p>
            </div>

            <form [formGroup]="formularioRSS" (ngSubmit)="editaRSS()">
              <!-- Si se agregan campos como Precio o Activa en el futuro, irían aquí -->
              
              <div class="button-container ion-margin-top">
                <ion-button type="submit" expand="block" shape="round" color="primary">
                  Confirmar Relación Salsa Sucursal
                </ion-button>
              </div>
            </form>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
